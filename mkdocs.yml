site_name: e11ocutionist
site_description: Transform written text into natural-sounding audio with an LLM-powered processing pipeline
site_url: https://twardoch.github.io/e11ocutionist/
repo_url: https://github.com/twardoch/e11ocutionist
repo_name: twardoch/e11ocutionist

theme:
  name: material
  logo: assets/icon.png
  favicon: assets/icon.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How It Works: how-it-works.md
  - CLI Reference: cli-reference.md
  - Python API: python-api.md
  - Changelog: changelog.md
